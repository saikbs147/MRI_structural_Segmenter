<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f8f7f4;
    color: #1a1a1a;
    padding: 16px;
    font-size: 14px;
  }
  h1 {
    font-size: 15px;
    font-weight: 500;
    color: #1a1a1a;
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 12px;
    color: #888;
    margin-bottom: 16px;
  }
  .stats {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat {
    background: #fff;
    border: 0.5px solid rgba(0,0,0,0.1);
    border-radius: 8px;
    padding: 10px 14px;
    flex: 1;
  }
  .stat-label {
    font-size: 11px;
    color: #888;
    margin-bottom: 2px;
  }
  .stat-value {
    font-size: 20px;
    font-weight: 500;
    color: #1a1a1a;
  }
  .group-card {
    background: #fff;
    border: 0.5px solid rgba(0,0,0,0.1);
    border-radius: 10px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .group-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: #f0ede6;
    border-bottom: 0.5px solid rgba(0,0,0,0.08);
  }
  .series-name {
    font-size: 13px;
    font-weight: 500;
    color: #1a1a1a;
  }
  .badge {
    font-size: 11px;
    font-weight: 500;
    background: #534AB7;
    color: #CECBF6;
    padding: 2px 8px;
    border-radius: 20px;
  }
  .file-list {
    padding: 0;
  }
  .file-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 14px;
    border-bottom: 0.5px solid rgba(0,0,0,0.06);
    font-size: 12px;
    color: #444;
  }
  .file-row:last-child { border-bottom: none; }
  .file-icon {
    width: 20px;
    height: 20px;
    background: #EAF3DE;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .file-icon svg { width: 12px; height: 12px; }
  .no-data {
    text-align: center;
    padding: 40px 16px;
    color: #888;
    font-size: 13px;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1c1c1e; color: #e5e5e5; }
    h1 { color: #e5e5e5; }
    .stat { background: #2c2c2e; border-color: rgba(255,255,255,0.1); }
    .stat-value { color: #e5e5e5; }
    .group-card { background: #2c2c2e; border-color: rgba(255,255,255,0.1); }
    .group-header { background: #3a3a3c; border-color: rgba(255,255,255,0.08); }
    .series-name { color: #e5e5e5; }
    .file-row { color: #ccc; border-color: rgba(255,255,255,0.06); }
    .file-icon { background: #27500A; }
  }
</style>
</head>
<body>
<h2 class="sr-only" style="position:absolute;left:-9999px">MRI DICOM segmentation results grouped by Series Description</h2>
<h1>MRI DICOM Segmentation</h1>
<p class="subtitle" id="subtitle">Grouped by Series Description</p>

<div class="stats" id="stats"></div>
<div id="groups"></div>

<script>
  const params = new URLSearchParams(window.location.search);
  const raw = params.get('data');

  if (!raw) {
    document.getElementById('groups').innerHTML =
      '<div class="no-data">No DICOM data received.</div>';
  } else {
    try {
      const data = JSON.parse(decodeURIComponent(raw));
      const totalFiles = data.reduce((s, g) => s + g.count, 0);

      document.getElementById('subtitle').textContent =
        'Grouped by Series Description';

      const statsEl = document.getElementById('stats');
      statsEl.innerHTML = `
        <div class="stat">
          <div class="stat-label">Total files</div>
          <div class="stat-value">${totalFiles}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Series found</div>
          <div class="stat-value">${data.length}</div>
        </div>`;

      const groupsEl = document.getElementById('groups');
      if (data.length === 0) {
        groupsEl.innerHTML = '<div class="no-data">No series detected.</div>';
      } else {
        groupsEl.innerHTML = data.map(group => `
          <div class="group-card">
            <div class="group-header">
              <span class="series-name">${escHtml(group.series)}</span>
              <span class="badge">${group.count} file${group.count !== 1 ? 's' : ''}</span>
            </div>
            <div class="file-list">
              ${group.files.map(f => `
                <div class="file-row">
                  <div class="file-icon" aria-hidden="true">
                    <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <rect x="2" y="1" width="9" height="14" rx="1.5" fill="#639922"/>
                      <path d="M9 1l4 4h-3a1 1 0 01-1-1V1z" fill="#3B6D11"/>
                    </svg>
                  </div>
                  ${escHtml(f)}
                </div>`).join('')}
            </div>
          </div>`).join('');
      }
    } catch (e) {
      document.getElementById('groups').innerHTML =
        '<div class="no-data">Error parsing data: ' + e.message + '</div>';
    }
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
